function val(key,trFallback,enFallback){let dt=(DATA.translations&&DATA.translations[currentLang])||{};let v=dt[key];if(v!==undefined&&String(v).trim()!=='')return v;return currentLang==='tr'?trFallback:enFallback}
function getHomeBlocks(){DATA.home=DATA.home||{};DATA.home.blocks=DATA.home.blocks||[];if((DATA.home.images||[]).length&&!DATA.home._migratedToBlocks){(DATA.home.images||[]).forEach(src=>DATA.home.blocks.push({id:uid(),image:src,title:emptyLangObj(''),text:emptyLangObj('')}));DATA.home.images=[];DATA.home._migratedToBlocks=true}return DATA.home.blocks}
function renderHome(){const box=document.getElementById('homeMedia');if(!box)return;box.innerHTML='';const hero=document.createElement('div');hero.className='cleanHomeHero';const kicker=val('kicker','ULUSLARARASI EMLAK • TÜRKİYE','INTERNATIONAL REAL ESTATE • TURKEY');const title=val('heroTitle','Lüks Villalar ve Yatırım Fırsatları','Luxury Villas & Investment Opportunities');const text=val('heroText','Premium villalar, değerli arsalar ve seçilmiş yatırım projeleri için güvenilir danışmanlık.','Discover premium villas, valuable land and selected investment projects with Rüya Global Estate.');const explore=val('explore','İlanları Gör','Explore Properties');const contact=val('contactUs','İletişim','Contact Us');hero.innerHTML='<div class="eyebrow">'+esc(kicker)+'</div><h2>'+esc(title)+'</h2><p>'+esc(text)+'</p><div class="cleanHomeActions"><a href="#villas" class="btn gold" data-page="villas">'+esc(explore)+'</a><a href="#contact" class="btn out" data-page="contact">'+esc(contact)+'</a></div>';box.appendChild(hero);hero.querySelectorAll('[data-page]').forEach(a=>a.onclick=e=>{e.preventDefault();location.hash=a.dataset.page;showPage(a.dataset.page)});const grid=document.createElement('div');grid.className='cleanHomeGrid';[['villas',val('villasTitle','Villalar','Villas'),val('villasText','Seçilmiş premium villa fırsatları.','Premium villas selected for lifestyle, location and investment value.')],['land',val('landTitle','Arsa','Land'),val('landText','Yatırımcılar için stratejik arsa fırsatları.','Strategic land opportunities for investors and developers.')],['projects',val('projectsTitle','Projeler','Projects'),val('projectsText','Seçilmiş geliştirme ve inşaat fırsatları.','Selected development and construction opportunities.')]].forEach(([page,ttl,tx])=>{let a=document.createElement('a');a.className='cleanHomeTile';a.href='#'+page;a.dataset.page=page;a.innerHTML='<h3>'+esc(ttl)+'</h3><p>'+esc(tx)+'</p>';a.onclick=e=>{e.preventDefault();location.hash=page;showPage(page)};grid.appendChild(a)});box.appendChild(grid);const blocks=getHomeBlocks().filter(b=>b.image||txt(b.title)||txt(b.text));if(blocks.length){let sec=document.createElement('div');sec.className='homeSmallFeatured';sec.innerHTML='<h2>'+(currentLang==='tr'?'Öne Çıkanlar':'Featured')+'</h2>';let rail=document.createElement('div');rail.className='homeSmallRail';blocks.forEach(b=>{let c=document.createElement('div');c.className='homeSmallCard';if(b.image){let im=document.createElement('img');im.src=b.image;im.loading='lazy';im.onclick=()=>openImageFull(b.image);c.appendChild(im)}let body=document.createElement('div');let bt=txt(b.title),bx=txt(b.text);if(bt)body.innerHTML+='<h3>'+esc(bt)+'</h3>';if(bx)body.innerHTML+='<p>'+esc(bx).replace(/\n/g,'<br>')+'</p>';if(bt||bx)c.appendChild(body);rail.appendChild(c)});sec.appendChild(rail);box.appendChild(sec)}}
function cleanDisplayText(obj){let v=txt(obj);return ['Yeni İlan','New Listing','Açıklama','Description'].includes(String(v||'').trim())?'':v}
function hasRealListingContent(item){let imgs=(item.images||[]).filter(Boolean);return !!(cleanDisplayText(item.title)||cleanDisplayText(item.desc)||item.price||item.location||imgs.length)}
function renderListings(){['villaList','landList','projectList'].forEach(id=>{let box=document.getElementById(id);if(!box)return;box.innerHTML='';(DATA.listings?.[id]||[]).forEach(item=>{if(!hasRealListingContent(item))return;let div=document.createElement('div');div.className='card';let imgs=(item.images||[]).filter(Boolean);if(imgs.length){let gal=document.createElement('div');gal.className='listingGallery';imgs.forEach(src=>{let im=document.createElement('img');im.src=src;im.loading='lazy';im.onclick=()=>openImageFull(src);gal.appendChild(im)});div.appendChild(gal);if(imgs.length>1){let dots=document.createElement('div');dots.className='galleryDots';imgs.slice(0,10).forEach(()=>dots.appendChild(document.createElement('span')));div.appendChild(dots)}}let title=cleanDisplayText(item.title),desc=cleanDisplayText(item.desc);if(title)div.innerHTML+='<h3>'+esc(title)+'</h3>';if(item.price)div.innerHTML+='<p class="small"><b>'+esc(item.price)+'</b></p>';if(item.location)div.innerHTML+='<p class="small">'+esc(item.location)+'</p>';if(desc)div.innerHTML+='<p class="small">'+esc(desc).replace(/\n/g,'<br>')+'</p>';box.appendChild(div)})})}
function renderAbout(){let introBox=document.getElementById('aboutIntro');introBox.innerHTML='';let intro=txt(DATA.about?.intro||{});if(intro)introBox.innerHTML='<div class="card"><p class="small">'+esc(intro).replace(/\n/g,'<br>')+'</p></div>';let box=document.getElementById('aboutBlocks');box.innerHTML='';(DATA.about?.blocks||[]).forEach(b=>{let div=document.createElement('div');div.className='card';if(b.image)div.innerHTML+='<img src="'+esc(b.image)+'" style="width:100%;border-radius:18px;border:1px solid var(--gold)" onclick="openImageFull(\''+esc(b.image)+'\')">';if(b.title)div.innerHTML+='<h3>'+esc(b.title)+'</h3>';let tx=txt(b.text);if(tx)div.innerHTML+='<p class="small">'+esc(tx).replace(/\n/g,'<br>')+'</p>';box.appendChild(div)})}
function renderContact(){let s=DATA.settings||{};contactText.innerHTML=esc(txt(DATA.contact?.extraText||{})).replace(/\n/g,'<br>');contactLinks.innerHTML='<a href="tel:'+cleanPhone(s.phone)+'">📞 '+esc(s.phone||'')+'</a><a href="https://wa.me/'+waNum(s.whatsapp)+'" target="_blank">🟢 WhatsApp</a><a href="mailto:'+esc(s.email||'')+'">✉️ '+esc(s.email||'')+'</a>'+(s.address?'<a href="https://maps.google.com/?q='+encodeURIComponent(s.address)+'" target="_blank">📍 '+esc(s.address)+'</a>':'');floatingWa.href='https://wa.me/'+waNum(s.whatsapp)}
function renderSocial(){socialIcons.innerHTML=''}
function openImageFull(src){simpleLightboxImg.src=src;simpleLightbox.classList.add('show')}window.openImageFull=openImageFull;

function showPage(id){document.querySelectorAll('.page,.admin').forEach(p=>p.classList.remove('active'));let el=document.getElementById(id);if(el)el.classList.add('active');document.querySelectorAll('#mainNav a').forEach(a=>a.classList.toggle('active',a.dataset.page===id))}
document.querySelectorAll('[data-page]').forEach(a=>a.addEventListener('click',e=>{e.preventDefault();location.hash=a.dataset.page;showPage(a.dataset.page)}));window.addEventListener('hashchange',()=>showPage((location.hash||'#home').replace('#','')||'home'));

function loginAdmin(){if(document.getElementById('pass').value==='ruya2026'){isAdmin=true;adminPanel.classList.remove('hidden');buildAdmin()}else alert('Wrong password')}window.loginAdmin=loginAdmin;
function safeId(s){return String(s).replace(/[ğĞ]/g,'g').replace(/[üÜ]/g,'u').replace(/[şŞ]/g,'s').replace(/[ıİ]/g,'i').replace(/[öÖ]/g,'o').replace(/[çÇ]/g,'c').replace(/\W/g,'')}
function buildAdmin(){const tabs=['Ayarlar','Ana Sayfa Resimleri','Villalar','Arsalar','Projeler','Hakkımızda','İletişim'];adminTabs.innerHTML='';adminSections.innerHTML='';tabs.forEach((t,i)=>{let b=document.createElement('button');b.className='tabbtn'+(i==0?' active':'');b.textContent=t;b.onclick=()=>adminTab(t);adminTabs.appendChild(b);let s=document.createElement('div');s.id='ad_'+safeId(t);s.className='admin-section'+(i==0?' active':'');adminSections.appendChild(s)});renderAdminSections()}
function adminTab(t){document.querySelectorAll('.tabbtn').forEach(b=>b.classList.toggle('active',b.textContent===t));document.querySelectorAll('.admin-section').forEach(s=>s.classList.remove('active'));document.getElementById('ad_'+safeId(t)).classList.add('active')}
function field(label,val,onchange,area=false){let id='f'+uid();return '<label>'+label+'</label>'+(area?'<textarea id="'+id+'">'+esc(val||'')+'</textarea>':'<input id="'+id+'" value="'+esc(val||'')+'">')+'<button class="tabbtn" onclick="'+onchange.replaceAll('__ID__',id)+'">Güncelle</button>'}
function renderAdminSections(){adminSettings();adminHomeImages();adminListings('Villalar','villaList');adminListings('Arsalar','landList');adminListings('Projeler','projectList');adminAbout();adminContact()}
window.updateField=async function(path,id){setByPath(DATA,path,document.getElementById(id).value);await saveSite(false);renderAll();if(isAdmin)buildAdmin()}
async function uploadFiles(inputId,pathBase){let input=document.getElementById(inputId),files=Array.from(input.files||[]);if(!files.length){alert('Önce resim seç.');return[]}let urls=[];for(const file of files){let name=Date.now()+'_'+Math.random().toString(36).slice(2)+'_'+file.name.replace(/[^\w.\-]/g,'_');let r=ref(storage,pathBase+'/'+name);await uploadBytes(r,file);urls.push(await getDownloadURL(r))}return urls}
window.deleteFromArray=async function(path,i){let arr=getByPath(DATA,path);arr.splice(i,1);await saveSite(false);renderAll();if(isAdmin)buildAdmin()}
window.deleteItem=async function(path,i){if(!confirm('Silinsin mi?'))return;let arr=getByPath(DATA,path);arr.splice(i,1);await saveSite(false);renderAll();if(isAdmin)buildAdmin()}

function adminSettings(){let s=DATA.settings||{};let html='<h2>Ayarlar</h2>';['brandMark','brandRuya','brandGlobal','phone','whatsapp','email','address','footer','seoTitle','seoDescription'].forEach(k=>html+=field(k,s[k]||'',`updateField('settings.${k}','__ID__')`,k.includes('Description')));document.getElementById('ad_Ayarlar').innerHTML=html}

/* ADMIN HOME IMAGE FIX */
window.clearHomeImages=async function(){if(confirm('Ana sayfadaki tüm resimler silinsin mi?')){DATA.home=DATA.home||{};DATA.home.images=[];DATA.home.blocks=DATA.home.blocks||[];DATA.home.blocks.forEach(b=>b.image='');await saveSite(false);renderAll();if(isAdmin)buildAdmin();alert('Anasayfa resimleri silindi.')}};
window.addHomeBlock=async function(){DATA.home=DATA.home||{};DATA.home.blocks=DATA.home.blocks||[];DATA.home.images=DATA.home.images||[];DATA.home.blocks.push({id:uid(),image:'',title:emptyLangObj(''),text:emptyLangObj('')});DATA.home._migratedToBlocks=true;await saveSite(false);renderAll();if(isAdmin)buildAdmin();alert('Yeni anasayfa bloğu eklendi.')};
window.uploadHomeBlockImage=async function(i,inputId){try{DATA.home=DATA.home||{};DATA.home.blocks=DATA.home.blocks||[];if(!DATA.home.blocks[i]){alert('Blok bulunamadı.');return}let urls=await uploadFiles(inputId,'site/home/'+(DATA.home.blocks[i].id||i));if(urls[0]){DATA.home.blocks[i].image=urls[0];DATA.home._migratedToBlocks=true;await saveSite(false);renderAll();if(isAdmin)buildAdmin();alert('Anasayfa resmi kaydedildi.')}}catch(e){alert('Anasayfa resmi yükleme hatası: '+e.message)}};
window.deleteHomeBlockImage=async function(i){DATA.home=DATA.home||{};DATA.home.blocks=DATA.home.blocks||[];if(!DATA.home.blocks[i]){alert('Silinecek resim bulunamadı.');return}DATA.home.blocks[i].image='';await saveSite(false);renderAll();if(isAdmin)buildAdmin();alert('Anasayfa resmi silindi.')};
window.deleteHomeBlock=async function(i){if(!confirm('Bu anasayfa bloğu tamamen silinsin mi?'))return;DATA.home=DATA.home||{};DATA.home.blocks=DATA.home.blocks||[];DATA.home.blocks.splice(i,1);await saveSite(false);renderAll();if(isAdmin)buildAdmin();alert('Anasayfa bloğu silindi.')};
window.clearAllHomeImages=async function(){if(!confirm('Anasayfadaki bütün resimler silinsin mi? Yazılar kalır.'))return;DATA.home=DATA.home||{};DATA.home.images=[];DATA.home.blocks=DATA.home.blocks||[];DATA.home.blocks.forEach(b=>b.image='');await saveSite(false);renderAll();if(isAdmin)buildAdmin();alert('Anasayfa resimleri temizlendi.')};
window.clearAllHomeBlocks=async function(){if(!confirm('Anasayfa bloklarının tamamı silinsin mi? Resim, başlık ve metinler silinir.'))return;DATA.home=DATA.home||{};DATA.home.images=[];DATA.home.blocks=[];DATA.home._migratedToBlocks=true;await saveSite(false);renderAll();if(isAdmin)buildAdmin();alert('Anasayfa blokları silindi.')};

function adminHomeImages(){getHomeBlocks();let html='<h2>Ana Sayfa Blokları</h2><p class="mini">Buradan anasayfa resimlerini ekleyip silebilirsin.</p><button class="btn gold" onclick="addHomeBlock()">Yeni Ana Sayfa Bloğu Ekle</button> <button class="btn out danger" onclick="clearAllHomeImages()">Anasayfa Resimlerinin Hepsini Sil</button> <button class="btn out danger" onclick="clearAllHomeBlocks()">Anasayfa Bloklarının Hepsini Sil</button>';DATA.home.blocks.forEach((b,i)=>{html+='<div class="rowbox"><h3>Ana Sayfa Blok '+(i+1)+'</h3>';if(b.image)html+='<img class="adminHomeBlockPreview" src="'+esc(b.image)+'"><br><button class="tabbtn danger" onclick="deleteHomeBlockImage('+i+')">Bu Resmi Sil</button>';else html+='<p class="mini">Bu blokta resim yok.</p>';html+='<div class="uploadbox"><label>Bu blok için resim seç</label><input id="home_block_img_'+i+'" type="file" accept="image/*"><button class="btn gold" onclick="uploadHomeBlockImage('+i+',\'home_block_img_'+i+'\')">Resmi Yükle ve Kaydet</button></div>';languages.forEach(l=>{html+=field('Başlık '+l[2],(b.title||{})[l[0]]||'',`updateField('home.blocks.${i}.title.${l[0]}','__ID__')`);html+=field('Metin '+l[2],(b.text||{})[l[0]]||'',`updateField('home.blocks.${i}.text.${l[0]}','__ID__')`,true)});html+='<button class="btn out danger" onclick="deleteHomeBlock('+i+')">Bu Bloğu Tamamen Sil</button></div>'});document.getElementById('ad_AnaSayfaResimleri').innerHTML=html}

window.quickAddListing=async function(id,fileInputId){let prefix='q_'+id+'_';let item={id:uid(),title:emptyLangObj(document.getElementById(prefix+'title').value.trim()),desc:emptyLangObj(document.getElementById(prefix+'desc').value.trim()),price:document.getElementById(prefix+'price').value.trim(),location:document.getElementById(prefix+'location').value.trim(),images:[]};DATA.listings[id]=DATA.listings[id]||[];DATA.listings[id].push(item);let urls=await uploadFiles(fileInputId,'listings/'+id+'/'+item.id);item.images.push(...urls);await saveSite(false);renderAll();if(isAdmin)buildAdmin();alert('İlan kaydedildi.')}
function adminListings(title,id){let html='<h2>'+title+'</h2><div class="rowbox uploadbox"><h3>Yeni İlan Ekle</h3><input id="q_'+id+'_title" placeholder="İlan başlığı"><input id="q_'+id+'_price" placeholder="Fiyat"><input id="q_'+id+'_location" placeholder="Konum"><textarea id="q_'+id+'_desc" placeholder="Açıklama"></textarea><input id="quick_'+id+'" type="file" accept="image/*" multiple><button class="btn gold" onclick="quickAddListing(\''+id+'\',\'quick_'+id+'\')">Yeni İlanı Resimlerle Yayınla</button></div>';DATA.listings[id]=DATA.listings[id]||[];DATA.listings[id].forEach((it,idx)=>{it.images=it.images||[];html+='<div class="rowbox"><h3>İlan '+(idx+1)+'</h3><div class="imgthumbs">';it.images.forEach((img,j)=>html+='<div class="imgthumb"><img src="'+esc(img)+'"><button class="tabbtn danger" onclick="deleteFromArray(\'listings.'+id+'.'+idx+'.images\','+j+')">Resmi Sil</button></div>');html+='</div><button class="btn out danger" onclick="deleteItem(\'listings.'+id+'\','+idx+')">İlanı Sil</button></div>'});document.getElementById('ad_'+safeId(title)).innerHTML=html}
function adminAbout(){document.getElementById('ad_Hakkimizda').innerHTML='<h2>Hakkımızda</h2><p class="mini">Bu dosyada ana düzeltme anasayfa admin resimleridir.</p>'}
function adminContact(){let html='<h2>İletişim Metni</h2>';languages.forEach(l=>html+=field('İletişim '+l[2],(DATA.contact.extraText||{})[l[0]]||'',`updateField('contact.extraText.${l[0]}','__ID__')`,true));document.getElementById('ad_Iletisim').innerHTML=html}

window.saveSite=saveSite;window.buildAdmin=buildAdmin;
setLang(currentLang);showPage((location.hash||'#home').replace('#','')||'home');loadSite();
</script>
