function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
function merge(a,b){for(const k in b||{}){if(b[k]&&typeof b[k]==='object'&&!Array.isArray(b[k]))a[k]=merge(a[k]||{},b[k]);else a[k]=b[k]}return a}
function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function txt(obj){
  if(!obj) return '';
  if(typeof obj!=='object') return obj;
  let v=obj[currentLang];
  if(v!==undefined && String(v).trim()!=='') return v;
  v=obj.en;
  if(v!==undefined && String(v).trim()!=='') return v;
  v=obj.tr;
  if(v!==undefined && String(v).trim()!=='') return v;
  return Object.values(obj).find(x=>String(x||'').trim()!=='')||'';
}
function cleanPhone(p){return (p||'').replace(/[^0-9+]/g,'').replace(/^00/,'+')}

function normalizeTranslations(){
  DATA.translations = DATA.translations || {};
  Object.keys(baseT).forEach(code=>{
    let current = DATA.translations[code] || {};
    // If Firebase old data has copied English into non-English languages, replace it with the real language pack.
    if(code!=='en' && code!=='tr'){
      let looksEnglish = !current.heroTitle || current.heroTitle===baseT.en.heroTitle || current.kicker===baseT.en.kicker || JSON.stringify(current.nav||[])===JSON.stringify(baseT.en.nav);
      if(looksEnglish) DATA.translations[code] = JSON.parse(JSON.stringify(baseT[code]));
      else DATA.translations[code] = Object.assign({}, JSON.parse(JSON.stringify(baseT[code])), current);
    }else{
      DATA.translations[code] = Object.assign({}, JSON.parse(JSON.stringify(baseT[code])), current);
    }
  });
}

const GALLERIES={};let LIGHTBOX_IMAGES=[],LIGHTBOX_INDEX=0;
function galleryHTML(images){images=(images||[]).filter(Boolean);if(!images.length)return '';let gid='g'+uid();GALLERIES[gid]=images;let imgs=images.map((s,i)=>`<img src="${esc(s)}" data-gid="${gid}" data-idx="${i}" onerror="this.style.display='none'">`).join('');return `<div class="gallery"><div class="gallery-track">${imgs}</div>${images.length>1?`<div class="gallery-count">${images.length} Fotoğraf</div>`:''}</div><div class="galleryHint"></div>`}
function openLightbox(images,index){LIGHTBOX_IMAGES=images||[];LIGHTBOX_INDEX=index||0;if(!LIGHTBOX_IMAGES.length)return;document.getElementById('lightboxImg').src=LIGHTBOX_IMAGES[LIGHTBOX_INDEX];document.getElementById('lightbox').classList.add('show')}
function closeLightbox(){document.getElementById('lightbox').classList.remove('show')}
function nextLightbox(){if(!LIGHTBOX_IMAGES.length)return;LIGHTBOX_INDEX=(LIGHTBOX_INDEX+1)%LIGHTBOX_IMAGES.length;document.getElementById('lightboxImg').src=LIGHTBOX_IMAGES[LIGHTBOX_INDEX]}
function prevLightbox(){if(!LIGHTBOX_IMAGES.length)return;LIGHTBOX_INDEX=(LIGHTBOX_INDEX-1+LIGHTBOX_IMAGES.length)%LIGHTBOX_IMAGES.length;document.getElementById('lightboxImg').src=LIGHTBOX_IMAGES[LIGHTBOX_INDEX]}
document.addEventListener('click',e=>{let im=e.target.closest('img[data-gid]');if(im){openLightbox(GALLERIES[im.dataset.gid],Number(im.dataset.idx)||0)}if(e.target.id==='lightbox'||e.target.id==='lbClose')closeLightbox();if(e.target.id==='lbNext')nextLightbox();if(e.target.id==='lbPrev')prevLightbox();});


async function loadSite(){
 try{
   const snap=await getDoc(SITE_REF);
   if(snap.exists()){ DATA=merge(structuredClone(DEFAULT_DATA),snap.data()); cleanOldDemoContent(); normalizeTranslations(); }
   else await saveSite(false);
   document.getElementById('fbStatus').textContent='Firebase bağlı. Veriler yüklendi.';
   renderAll();
 }catch(e){
   document.getElementById('fbStatus').textContent='Firebase bağlantı/rule hatası: '+e.message;
   console.error(e);
   renderAll();
 }
}
async function saveSite(show=true){
 try{
   await setDoc(SITE_REF,{...DATA,updatedAt:serverTimestamp()},{merge:false});
   if(show) alert('Kaydedildi ve yayına alındı.');
   return true;
 }catch(e){
   alert('Firebase kaydetme hatası: '+e.message);
   console.error(e);
   return false;
 }
}

function getHomeBlocks(){
  DATA.home=DATA.home||{};
  DATA.home.blocks=DATA.home.blocks||[];
  if((DATA.home.images||[]).length && !DATA.home._migratedToBlocks){
    (DATA.home.images||[]).forEach(src=>DATA.home.blocks.push({id:uid(),image:src,title:emptyLangObj(''),text:emptyLangObj('')}));
    DATA.home.images=[];
    DATA.home._migratedToBlocks=true;
  }
  return DATA.home.blocks;
}

   let c=document.createElement('div');

     img.src=b.image;

async function uploadFiles(inputId,pathBase){
 let input=document.getElementById(inputId), files=Array.from(input.files||[]);
 if(!files.length){alert('Önce resim seç.');return []}
 let urls=[];
 for(const file of files){
   let name=Date.now()+'_'+Math.random().toString(36).slice(2)+'_'+file.name.replace(/[^\w.\-]/g,'_');
   let r=ref(storage,pathBase+'/'+name);
   await uploadBytes(r,file);
   urls.push(await getDownloadURL(r));
 }
 return urls;
}
